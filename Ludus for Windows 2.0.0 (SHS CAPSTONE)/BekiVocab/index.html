// Utility functions
function createListItem(word, definition, type) {
    const li = document.createElement('li');
    li.textContent = `${word}: ${definition}`;
    const favoriteButton = document.createElement('button');
    favoriteButton.textContent = 'Add to Favorites';
    favoriteButton.onclick = () => addToFavorites(word, definition, type);
    li.appendChild(favoriteButton);
    return li;
}

function displayWordOfTheDay() {
    const words = Object.keys(dictionary.properNouns);
    const randomWord = words[Math.floor(Math.random() * words.length)];
    const definition = dictionary.properNouns[randomWord];
    const wordOfTheDayElement = document.getElementById('wordOfTheDay');
    wordOfTheDayElement.innerHTML = `<h2>Word of the Day</h2><p><strong>${randomWord}:</strong> ${definition}</p>`;
}

function searchWord() {
    const searchInput = document.getElementById('searchInput').value.toLowerCase();
    const dictionaryContent = document.getElementById('dictionaryContent');
    dictionaryContent.innerHTML = '';
    let found = false;

    for (const [type, entries] of Object.entries(dictionary)) {
        for (const [word, definition] of Object.entries(entries)) {
            if (word.toLowerCase().includes(searchInput) || definition.toLowerCase().includes(searchInput)) {
                dictionaryContent.appendChild(createListItem(word, definition, type));
                found = true;
            }
        }
    }

    if (!found) {
        dictionaryContent.innerHTML = '<p>No results found</p>';
    }
}

function addToFavorites(word, definition, type) {
    const favoritesList = document.getElementById('favoritesList');
    const li = document.createElement('li');
    li.textContent = `${word}: ${definition}`;
    favoritesList.appendChild(li);

    // Store favorite in localStorage
    const favorites = JSON.parse(localStorage.getItem('favorites')) || [];
    favorites.push({ word, definition, type });
    localStorage.setItem('favorites', JSON.stringify(favorites));
}

function loadFavorites() {
    const favoritesList = document.getElementById('favoritesList');
    const favorites = JSON.parse(localStorage.getItem('favorites')) || [];
    favorites.forEach(favorite => {
        const li = document.createElement('li');
        li.textContent = `${favorite.word}: ${favorite.definition}`;
        favoritesList.appendChild(li);
    });
}

// Initial setup
document.addEventListener('DOMContentLoaded', () => {
    displayWordOfTheDay();
    loadFavorites();
});
